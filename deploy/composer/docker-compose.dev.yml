name: nexus-wallet

services:
  db:
    image: postgres:15-alpine
    container_name: nexus-postgres-dev
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB

  redis:
    image: redis:7-alpine
    container_name: nexus-redis-dev
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata_dev:/data

  backend:
    build:
      context: ../../
      dockerfile: backend/Dockerfile
    container_name: nexus-backend-dev
    restart: always
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - REDIS_URL=redis://redis:6379
      - HOST=0.0.0.0
      - PORT=8002
      - JWT_ACCESS_SECRET
      - JWT_REFRESH_SECRET
      - ACCESS_TOKEN_TTL
      - REFRESH_TOKEN_TTL_DAYS
      - COINGECKO_API_KEY
      - COINGECKO_BASE_URL
      - SWAP_FEE_PERCENT
      - WEBHOOK_SECRET
    ports:
      - "8002:8002"
    depends_on:
      - db
      - redis

volumes:
  pgdata_dev:
  redisdata_dev:
