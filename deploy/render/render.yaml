services:
  # Unified Fastify API + Proxy
  - type: web
    name: nexus-backend
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8002
      - key: PROXY_PORT
        value: 8001
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexus-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL_DAYS
        value: 7
      - key: COINGECKO_API_KEY
        value: CG-QHRZtR8E9ekUM2z4YYAnnnRY
      - key: COINGECKO_BASE_URL
        value: https://api.coingecko.com/api/v3
      - key: SWAP_FEE_PERCENT
        value: 1.5

databases:
  - name: nexus-db
    plan: free
    postgresVersion: 15

redis:
  - name: nexus-redis
    plan: free
    ipAllowList: [] # Only allow internal access
